name: Job Scout
on:
  schedule:
    - cron: "0 16 * * *"  # noon Toronto time, every day
  workflow_dispatch:          # lets you trigger it manually from the Actions tab
jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install anthropic requests
      - name: Restore seen-jobs cache
        uses: actions/cache/restore@v4
        with:
          path: data/
          key: seen-jobs-${{ runner.os }}-${{ github.run_id }}
          restore-keys: seen-jobs-${{ runner.os }}-
      - name: Check secrets
        run: |
          echo "ADZUNA_APP_ID length: ${#ADZUNA_APP_ID}"
          echo "ADZUNA_APP_KEY length: ${#ADZUNA_APP_KEY}"
          echo "ANTHROPIC_API_KEY length: ${#ANTHROPIC_API_KEY}"
          echo "GMAIL_APP_PASSWORD length: ${#GMAIL_APP_PASSWORD}"
        env:
          ADZUNA_APP_ID:      ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:     ${{ secrets.ADZUNA_APP_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      - name: Run Job Scout
        env:
          ADZUNA_APP_ID:      ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:     ${{ secrets.ADZUNA_APP_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_SENDER:       ${{ secrets.GMAIL_SENDER }}
          GMAIL_RECIPIENT:    ${{ secrets.GMAIL_RECIPIENT }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scout.py
      - name: Save seen-jobs cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/
          key: seen-jobs-${{ runner.os }}-${{ github.run_id }}
